name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore SecurityBadgePrinter/SecurityBadgePrinter.csproj
      
    - name: Build
      run: dotnet build SecurityBadgePrinter/SecurityBadgePrinter.csproj --configuration Release --no-restore
      
    - name: Run tests
      run: dotnet test SecurityBadgePrinter/SecurityBadgePrinter.csproj --configuration Release --no-build --verbosity normal
      continue-on-error: true
      
    - name: Publish application
      run: |
        dotnet publish SecurityBadgePrinter/SecurityBadgePrinter.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:PublishTrimmed=false `
          -o ./publish
          
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SecurityBadgePrinter-${{ github.sha }}
        path: ./publish/
        retention-days: 30
        
    - name: Get version from assembly
      id: version
      shell: pwsh
      run: |
        $exePath = "./publish/SecurityBadgePrinter.exe"
        if (Test-Path $exePath) {
          $version = (Get-Item $exePath).VersionInfo.FileVersion
          if (-not $version) { $version = "1.0.0.0" }
          $version3 = ($version -replace '^(\d+\.\d+\.\d+).*','$1')
          echo "version=$version3" >> $env:GITHUB_OUTPUT
          echo "Application version: $version3"
        }
        
    - name: Create release tag (on main branch)
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.version }}"
        if ($version) {
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "v$version" -m "Release version $version"
          git push origin "v$version"
        }
      continue-on-error: true
